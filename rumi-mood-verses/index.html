<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Pick a mood, receive a Rumi verse. A small experiment in emotion-driven interfaces.">
<title>Mood Verses · Rumi</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22%3E%3Crect width=%2264%22 height=%2264%22 rx=%2214%22 fill=%22%230a0e17%22/%3E%3Cg fill=%22%2357c2b4%22 stroke=%22%230a0e17%22 stroke-width=%222.5%22%3E%3Cellipse cx=%2232%22 cy=%2215%22 rx=%227%22 ry=%2211%22/%3E%3Cellipse cx=%2232%22 cy=%2215%22 rx=%227%22 ry=%2211%22 transform=%22rotate%2860 32 32%29%22/%3E%3Cellipse cx=%2232%22 cy=%2215%22 rx=%227%22 ry=%2211%22 transform=%22rotate%28120 32 32%29%22/%3E%3Cellipse cx=%2232%22 cy=%2215%22 rx=%227%22 ry=%2211%22 transform=%22rotate%28180 32 32%29%22/%3E%3Cellipse cx=%2232%22 cy=%2215%22 rx=%227%22 ry=%2211%22 transform=%22rotate%28240 32 32%29%22/%3E%3Cellipse cx=%2232%22 cy=%2215%22 rx=%227%22 ry=%2211%22 transform=%22rotate%28300 32 32%29%22/%3E%3C/g%3E%3Ccircle cx=%2232%22 cy=%2232%22 r=%226.5%22 fill=%22%238fdacf%22/%3E%3C/svg%3E">
<style>
  /* ============ Tokens ============ */
  :root {
    --void: #0a0e17;
    --surface: #131a2b;
    --line: #28324a;
    --text: #e4e6e2;
    --muted: #6d7488;          /* decorative only */
    --muted-readable: #8d94a6; /* AA-safe small text on --void */
    --accent: #57c2b4;

    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, "Times New Roman", serif;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;

    --breath: 4000ms; /* the tempo of a mood change */
  }

  /* ============ Base ============ */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    background: var(--void);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ============ Atmosphere ============ */
  #atmosphere {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    z-index: 0;
  }

  /* A slow whole-page swell on mood change — the "breath". */
  .stage {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    transition: filter var(--breath) ease-in-out;
  }
  .stage.inhale { filter: brightness(1.06); }

  /* ============ Header ============ */
  header {
    padding: clamp(1.25rem, 4vw, 2.5rem) clamp(1.25rem, 5vw, 3rem) 0;
  }
  .eyebrow {
    font-size: 0.6875rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
  }
  h1 {
    margin-top: 0.5rem;
    font-family: var(--serif);
    font-weight: 400;
    font-size: clamp(1.375rem, 3.5vw, 1.75rem);
    letter-spacing: 0.01em;
  }
  .subline {
    margin-top: 0.375rem;
    font-size: 0.8125rem;
    color: var(--muted-readable);
    letter-spacing: 0.02em;
  }

  /* ============ Verse ============ */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem clamp(1.25rem, 6vw, 3rem);
    min-height: 0;
  }
  .verse-block {
    max-width: 34rem;
    text-align: center;
    transition: opacity 900ms ease, transform 900ms ease;
  }
  .verse-block.fading {
    opacity: 0;
    transform: translateY(8px);
    transition-duration: 500ms;
  }
  blockquote {
    font-family: var(--serif);
    font-size: clamp(1.375rem, 4.5vw, 2rem);
    line-height: 1.55;
    font-weight: 400;
    quotes: none;
  }
  cite {
    display: block;
    margin-top: 1.5rem;
    font-family: var(--sans);
    font-style: normal;
    font-size: 0.75rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted-readable);
  }

  /* The breath line — swells once per verse, then rests. */
  .breath-line {
    width: 2.5rem;
    height: 1px;
    margin: 1.75rem auto 0;
    background: var(--accent);
    opacity: 0.85;
    transform-origin: center;
    animation: breathe var(--breath) ease-in-out 1;
  }
  @keyframes breathe {
    0%   { transform: scaleX(0.3); opacity: 0.3; }
    55%  { transform: scaleX(1.35); opacity: 0.95; }
    100% { transform: scaleX(1);   opacity: 0.85; }
  }

  .another {
    margin-top: 2.25rem;
    background: none;
    border: none;
    color: var(--accent);
    font-family: var(--sans);
    font-size: 0.8125rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 0.625rem 0.875rem;
    border-radius: 2px;
    transition: opacity 300ms ease;
  }
  .another:hover { opacity: 0.75; }

  /* ============ Mood choices ============ */
  .moods {
    padding: 0 clamp(1.25rem, 5vw, 3rem) clamp(1.5rem, 4vw, 2.5rem);
    text-align: center;
  }
  .moods-label {
    font-size: 0.6875rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted-readable);
    margin-bottom: 0.875rem;
  }
  .mood-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.5rem;
  }
  .mood {
    font-family: var(--sans);
    font-size: 0.875rem;
    letter-spacing: 0.04em;
    color: var(--text);
    background: rgba(19, 26, 43, 0.72);
    background: color-mix(in srgb, var(--surface) 72%, transparent);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 0.625rem 1.125rem;
    cursor: pointer;
    transition: border-color 400ms ease, color 400ms ease, background 400ms ease;
  }
  .mood:hover { border-color: var(--accent); }
  .mood[aria-pressed="true"] {
    color: var(--accent);
    border-color: var(--accent);
    background: #182736;
    background: color-mix(in srgb, var(--accent) 8%, var(--surface));
  }

  /* ============ Focus ============ */
  :is(button, a):focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
    border-radius: 4px;
  }

  /* ============ Reduced motion ============ */
  @media (prefers-reduced-motion: reduce) {
    .stage, .verse-block, .mood, .another { transition: none; }
    .breath-line { animation: none; }
  }
</style>
</head>
<body>

<canvas id="atmosphere" aria-hidden="true"></canvas>

<div class="stage" id="stage">
  <header>
    <p class="eyebrow">AI Labs · Experiment 01</p>
    <h1>Mood Verses</h1>
    <p class="subline">Rumi, in answer to a feeling. No goal — just a moment.</p>
  </header>

  <main>
    <div class="verse-block" id="verseBlock">
      <div aria-live="polite" aria-atomic="true">
        <blockquote id="verseText"></blockquote>
        <cite id="verseCite"></cite>
      </div>
      <div class="breath-line" id="breathLine"></div>
      <button class="another" id="anotherBtn" type="button">Another verse</button>
    </div>
  </main>

  <nav class="moods" aria-label="Choose a mood">
    <p class="moods-label" id="moodsLabel">How does this moment feel?</p>
    <div class="mood-row" role="group" aria-labelledby="moodsLabel" id="moodRow"></div>
  </nav>
</div>

<script>
(function () {
  "use strict";

  /* ---------- Content ----------
     Verses curated by Delara from public-domain English translations
     of the Mathnavi (R. A. Nicholson tradition). */
  const MOODS = {
    restless: {
      label: "Restless",
      verses: [
        { t: "Do not take away Your shadow from my head: I am restless, restless, restless.", c: "Mathnavi · Book 6 · Line 562" },
        { t: "Like the millstone turning, day and night, in revolution and moaning incessantly.", c: "Mathnavi · Book 6 · Line 911" },
        { t: "That King said, “those who have striven in Us”: He did not say, “those who have striven away from Us,” O restless one.", c: "Mathnavi · Book 6 · Line 2358" }
      ],
      colors: [[190, 112, 56], [132, 86, 50], [96, 58, 34]],
      drift: 2.2, moteSpeed: 1.6, moteDir: 0, motes: 60
    },
    longing: {
      label: "Longing",
      verses: [
        { t: "The grief of the dead is not on account of death; it is because “we dwelt upon the forms.”", c: "Mathnavi · Book 6 · Line 1454" },
        { t: "It is wrong to regret the past: what is gone will not come back: to remember it is of no avail.", c: "Mathnavi · Book 4 · Line 2244" },
        { t: "Therefore the sickness of love is the soul of health: its pains are the envy of every pleasure.", c: "Mathnavi · Book 6 · Line 4594" }
      ],
      colors: [[188, 74, 64], [208, 168, 92], [198, 116, 60]],
      drift: 0.9, moteSpeed: 0.6, moteDir: -0.3, motes: 44
    },
    joyful: {
      label: "Joyful",
      verses: [
        { t: "The bondsman of Destiny became the Commander of Destiny: hail to you, O keen-sighted one who art pleasing!", c: "Mathnavi · Book 6 · Line 2886" },
        { t: "I clutched that rope and climbed out: I became glad and strong and stout and rosy.", c: "Mathnavi · Book 5 · Line 2312" },
        { t: "Crying, “Joy to you, O bringer of the good news!” But the other recognised and fell unconscious.", c: "Mathnavi · Book 4 · Line 3276" }
      ],
      colors: [[98, 182, 112], [212, 192, 110], [214, 130, 162]],
      drift: 1.5, moteSpeed: 1.1, moteDir: -0.8, motes: 70
    },
    weary: {
      label: "Weary",
      verses: [
        { t: "Through phantasy that one becomes the way-layer of him who has escaped; and through phantasy this becomes the salve of him who has been wounded.", c: "Mathnavi · Book 5 · Line 323" },
        { t: "Necessarily, that way became barred to you, since the hearts of the “men of heart” were made sore by you.", c: "Mathnavi · Book 3 · Line 311" },
        { t: "The tricks of the necessitarians have bound me; their wooden sword has wounded my body.", c: "Mathnavi · Book 1 · Line 1093" }
      ],
      colors: [[72, 102, 174], [112, 92, 172], [50, 60, 112]],
      drift: 0.55, moteSpeed: 0.4, moteDir: 0.5, motes: 32
    },
    grateful: {
      label: "Grateful",
      verses: [
        { t: "You have no sure skill in rope-dancing, give thanks for your feet and walk on the ground.", c: "Mathnavi · Book 6 · Line 1353" },
        { t: "In mountain and hive and tree the bees are depositing a sugar-store of honey.", c: "Mathnavi · Book 6 · Line 34" },
        { t: "So that, when it rejoins the Moon, it may speak gratefully of you to the Lord of the heart.", c: "Mathnavi · Book 5 · Line 3688" }
      ],
      colors: [[210, 132, 172], [140, 100, 182], [92, 64, 132]],
      drift: 0.9, moteSpeed: 0.6, moteDir: -0.4, motes: 52
    }
  };
  const ORDER = ["restless", "longing", "joyful", "weary", "grateful"];

  const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)");

  /* ---------- State ---------- */
  let currentMood = "longing";
  let verseIndex = 0;

  /* ---------- DOM ---------- */
  const stage = document.getElementById("stage");
  const verseBlock = document.getElementById("verseBlock");
  const verseText = document.getElementById("verseText");
  const verseCite = document.getElementById("verseCite");
  const breathLine = document.getElementById("breathLine");
  const anotherBtn = document.getElementById("anotherBtn");
  const moodRow = document.getElementById("moodRow");

  ORDER.forEach(function (key) {
    const b = document.createElement("button");
    b.type = "button";
    b.className = "mood";
    b.textContent = MOODS[key].label;
    b.setAttribute("aria-pressed", String(key === currentMood));
    b.addEventListener("click", function () { setMood(key); });
    moodRow.appendChild(b);
    MOODS[key].button = b;
  });

  /* ---------- Verse handling ---------- */
  function showVerse(instant) {
    const v = MOODS[currentMood].verses[verseIndex];
    const swap = function () {
      verseText.textContent = v.t;
      verseCite.textContent = v.c;
      verseBlock.classList.remove("fading");
      breathLine.style.animation = "none";
      void breathLine.offsetWidth; /* restart breath */
      breathLine.style.animation = "";
    };
    if (instant || reduceMotion.matches) { swap(); return; }
    verseBlock.classList.add("fading");
    setTimeout(swap, 500);
  }

  function setMood(key) {
    if (key === currentMood) return;
    MOODS[currentMood].button.setAttribute("aria-pressed", "false");
    currentMood = key;
    verseIndex = 0;
    MOODS[key].button.setAttribute("aria-pressed", "true");
    atmosphere.setTarget(MOODS[key]);
    if (!reduceMotion.matches) {
      stage.classList.add("inhale");
      setTimeout(function () { stage.classList.remove("inhale"); }, 4000);
    }
    showVerse(false);
  }

  anotherBtn.addEventListener("click", function () {
    verseIndex = (verseIndex + 1) % MOODS[currentMood].verses.length;
    showVerse(false);
  });

  /* ---------- Atmosphere (canvas) ---------- */
  const atmosphere = (function () {
    const canvas = document.getElementById("atmosphere");
    const ctx = canvas.getContext("2d");
    let W = 0, H = 0, dpr = 1;
    let orbs = [], motes = [];
    let cur = null;    /* current lerped config: colors, drift, moteSpeed, moteDir */
    let target = null;
    let rafId = null;

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      W = window.innerWidth; H = window.innerHeight;
      canvas.width = W * dpr; canvas.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      if (reduceMotion.matches) drawFrame(1);
    }

    function makeOrbs() {
      orbs = [];
      for (let i = 0; i < 7; i++) {
        orbs.push({
          x: Math.random(), y: Math.random(),
          r: 0.3 + Math.random() * 0.35,            /* fraction of max dim */
          ang: Math.random() * Math.PI * 2,
          spin: 0.00008 + Math.random() * 0.00014,   /* radians per ms */
          orbit: 0.08 + Math.random() * 0.12,
          pulse: Math.random() * Math.PI * 2,
          pulseSpeed: 0.00012 + Math.random() * 0.0001,
          ci: i % 3
        });
      }
    }

    function makeMotes(n) {
      motes = [];
      for (let i = 0; i < n; i++) {
        motes.push({
          x: Math.random() * W, y: Math.random() * H,
          r: 0.6 + Math.random() * 1.3,
          a: 0.08 + Math.random() * 0.22,
          phase: Math.random() * Math.PI * 2,
          vx: (Math.random() - 0.5)
        });
      }
    }

    function lerp(a, b, t) { return a + (b - a) * t; }

    function lerpConfig(t) {
      for (let i = 0; i < 3; i++)
        for (let j = 0; j < 3; j++)
          cur.colors[i][j] = lerp(cur.colors[i][j], target.colors[i][j], t);
      cur.drift = lerp(cur.drift, target.drift, t);
      cur.moteSpeed = lerp(cur.moteSpeed, target.moteSpeed, t);
      cur.moteDir = lerp(cur.moteDir, target.moteDir, t);
    }

    let lastTime = 0;
    function drawFrame(now) {
      const dt = Math.min(now - lastTime, 50) || 16;
      lastTime = now;

      /* ease colors toward the target — the atmosphere's slow breath */
      lerpConfig(reduceMotion.matches ? 1 : 1 - Math.pow(0.9985, dt));

      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = "#0a0e17";
      ctx.fillRect(0, 0, W, H);

      const maxDim = Math.max(W, H);
      ctx.globalCompositeOperation = "lighter";
      orbs.forEach(function (o) {
        if (!reduceMotion.matches) o.ang += o.spin * dt * cur.drift;
        const cx = (o.x + Math.cos(o.ang) * o.orbit) * W;
        const cy = (o.y + Math.sin(o.ang * 0.8) * o.orbit) * H;
        const r = o.r * maxDim;
        const c = cur.colors[o.ci];
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
        g.addColorStop(0, "rgba(" + (c[0] | 0) + "," + (c[1] | 0) + "," + (c[2] | 0) + ",0.16)");
        g.addColorStop(1, "rgba(" + (c[0] | 0) + "," + (c[1] | 0) + "," + (c[2] | 0) + ",0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalCompositeOperation = "source-over";

      /* motes */
      if (!reduceMotion.matches) {
        const moteColor = cur.colors[0];
        motes.forEach(function (m) {
          m.phase += 0.0006 * dt;
          m.x += m.vx * 0.02 * dt * cur.moteSpeed;
          m.y += cur.moteDir * 0.015 * dt * cur.moteSpeed
               + Math.sin(m.phase) * 0.05;
          if (m.x < -5) m.x = W + 5; if (m.x > W + 5) m.x = -5;
          if (m.y < -5) m.y = H + 5; if (m.y > H + 5) m.y = -5;
          const tw = m.a * (0.65 + 0.35 * Math.sin(m.phase * 3));
          ctx.fillStyle = "rgba(" + (moteColor[0] | 0) + "," + (moteColor[1] | 0) + "," + (moteColor[2] | 0) + "," + tw.toFixed(3) + ")";
          ctx.beginPath();
          ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
          ctx.fill();
        });
      }
    }

    function loop(now) {
      drawFrame(now);
      rafId = requestAnimationFrame(loop);
    }

    function start(initial) {
      cur = {
        colors: initial.colors.map(function (c) { return c.slice(); }),
        drift: initial.drift, moteSpeed: initial.moteSpeed, moteDir: initial.moteDir
      };
      target = initial;
      makeOrbs();
      makeMotes(initial.motes);
      resize();
      if (reduceMotion.matches) {
        drawFrame(1); /* one static frame */
      } else {
        rafId = requestAnimationFrame(loop);
      }
    }

    function setTarget(cfg) {
      target = cfg;
      if (!reduceMotion.matches && motes.length !== cfg.motes) makeMotes(cfg.motes);
      if (reduceMotion.matches) { lerpConfig(1); drawFrame(1); }
    }

    reduceMotion.addEventListener("change", function () {
      if (reduceMotion.matches) {
        if (rafId) cancelAnimationFrame(rafId);
        rafId = null;
        lerpConfig(1); drawFrame(1);
      } else if (!rafId) {
        lastTime = 0;
        rafId = requestAnimationFrame(loop);
      }
    });

    window.addEventListener("resize", resize);
    return { start: start, setTarget: setTarget };
  })();

  /* ---------- Init ---------- */
  atmosphere.start(MOODS[currentMood]);
  showVerse(true);
})();
</script>
</body>
</html>
